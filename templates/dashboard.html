<!DOCTYPE html>
<html>

<head>

    <title>WAF Admin Dashboard</title>

    <style>

        body{
            margin:0;
            padding:0;
            background:#020617;
            font-family:Arial;
            color:white;
        }

        .navbar{

            background:#111827;

            padding:20px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            padding-left:40px;

            padding-right:40px;

            box-shadow:0px 0px 15px rgba(0,0,0,0.5);

        }

        .title{

            color:#38bdf8;

            font-size:28px;

            font-weight:bold;

        }

        .logout-btn{

            padding:12px 22px;

            background:#ef4444;

            border:none;

            border-radius:8px;

            color:white;

            cursor:pointer;

            font-size:15px;

            transition:0.3s;

        }

        .logout-btn:hover{

            background:#dc2626;

        }

        .container{

            width:900px;

            margin:auto;

            margin-top:60px;

        }

        .card{

            background:#111827;

            padding:35px;

            border-radius:18px;

            margin-bottom:30px;

            box-shadow:0px 0px 25px rgba(56,189,248,0.15);

        }

        h1{

            color:#38bdf8;

        }

        .stats{

            font-size:28px;

            color:lime;

            margin-top:20px;

        }

        .button{

            display:inline-block;

            margin-top:25px;

            padding:14px 24px;

            background:#38bdf8;

            color:white;

            text-decoration:none;

            border-radius:10px;

            transition:0.3s;

        }

        .button:hover{

            background:#0284c7;

        }

    </style>

</head>

<body>

<div class="navbar">

    <div class="title">

        Hybrid WAF Admin Dashboard

    </div>

    <a href="/logout">

        <button class="logout-btn">

            Logout

        </button>

    </a>

</div>

<div class="container">

    <div class="card">

        <h1>Firewall Status</h1>

        <div class="stats">

            ● ACTIVE & PROTECTED

        </div>

    </div>

    <div class="card">

        <h1>Total Security Events</h1>

        <div class="stats">

            {{ total_attacks }}

        </div>

        <a href="/logs" class="button">

            View Live Logs

        </a>

    </div>

</div>

</body>

</html>
