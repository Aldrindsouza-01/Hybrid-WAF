<!DOCTYPE html>
<html>

<head>

    <title>Feedback</title>

    <style>

        body{
            background:#020617;
            color:white;
            font-family:Arial;
            margin:0;
            padding:0;
        }

        .container{

            width:700px;

            margin:auto;

            margin-top:70px;

            background:#111827;

            padding:40px;

            border-radius:18px;

            text-align:center;

            box-shadow:0px 0px 20px rgba(56,189,248,0.15);

        }

        h1{

            color:#38bdf8;

            margin-bottom:20px;

        }

        .back-btn{

            padding:12px 22px;

            border:none;

            border-radius:8px;

            background:#38bdf8;

            color:white;

            cursor:pointer;

            font-size:15px;

            margin-bottom:30px;

        }

        .back-btn:hover{

            background:#0284c7;

        }

        textarea{

            width:100%;

            height:180px;

            background:#1e293b;

            color:white;

            border:none;

            border-radius:10px;

            padding:15px;

            font-size:16px;

            resize:none;

        }

        .submit-btn{

            margin-top:25px;

            padding:14px 28px;

            border:none;

            border-radius:10px;

            background:#38bdf8;

            color:white;

            cursor:pointer;

            font-size:16px;

        }

        .submit-btn:hover{

            background:#0284c7;

        }

        .message{

            margin-top:20px;

            color:lime;

            font-size:18px;

        }

    </style>

</head>

<body>

<div class="container">

    <h1>Customer Feedback</h1>

    <a href="/">

        <button class="back-btn">

            ← Back To Store

        </button>

    </a>

    <form method="POST">

        <textarea
            name="feedback"
            placeholder="Enter your feedback..."
            required
        ></textarea>

        <button type="submit" class="submit-btn">

            Submit Feedback

        </button>

    </form>

    <div class="message">

        {{ message }}

    </div>

</div>

</body>

</html>
