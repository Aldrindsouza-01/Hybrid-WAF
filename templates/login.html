<!DOCTYPE html>
<html>

<head>

    <title>Secure Login</title>

    <style>

        body{
            margin:0;
            padding:0;
            background:#020617;
            font-family:Arial;
            color:white;
        }

        .login-box{

            width:420px;

            margin:auto;

            margin-top:90px;

            background:#111827;

            padding:40px;

            border-radius:18px;

            text-align:center;

            box-shadow:0px 0px 30px rgba(56,189,248,0.3);

        }

        h1{

            color:#38bdf8;

            margin-bottom:10px;

        }

        .status{

            color:lime;

            margin-bottom:30px;

            font-weight:bold;

        }

        input{

            width:90%;

            padding:14px;

            margin-top:15px;

            border:none;

            border-radius:8px;

            background:#1e293b;

            color:white;

            font-size:15px;

        }

        .captcha{

            margin-top:25px;

            background:#0f172a;

            padding:15px;

            border-radius:10px;

            color:#38bdf8;

            font-size:22px;

            font-weight:bold;

        }

        button{

            width:95%;

            padding:14px;

            margin-top:25px;

            border:none;

            border-radius:8px;

            background:#38bdf8;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:0.3s;

        }

        button:hover{

            background:#0284c7;

            transform:scale(1.03);

        }

        .message{

            color:red;

            margin-top:20px;

        }

    </style>

</head>

<body>

<div class="login-box">

    <h1>Secure Login Portal</h1>

    <div class="status">

        ● WAF Protection Enabled

    </div>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <div class="captcha">

            Verify You Are Human

            <br><br>

            {{ captcha_question }} = ?

        </div>

        <input
            type="text"
            name="captcha"
            placeholder="Enter Answer"
            required
        >

        <button type="submit">

            Login Securely

        </button>

    </form>

    <div class="message">

        {{ message }}

    </div>

</div>

</body>

</html>
