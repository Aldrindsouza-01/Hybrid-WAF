<!DOCTYPE html>
<html>

<head>

    <title>Search Products</title>

    <style>

        body{
            background:#020617;
            color:white;
            font-family:Arial;
            margin:0;
            padding:0;
        }

        .container{

            width:90%;

            margin:auto;

            text-align:center;

            margin-top:40px;

        }

        h1{

            color:#38bdf8;

            margin-bottom:20px;

            font-size:42px;

        }

        .back-btn{

            padding:12px 22px;

            border:none;

            border-radius:8px;

            background:#38bdf8;

            color:white;

            cursor:pointer;

            font-size:15px;

            margin-bottom:30px;

            transition:0.3s;

        }

        .back-btn:hover{

            background:#0284c7;

        }

        input{

            width:60%;

            padding:15px;

            border:none;

            border-radius:10px;

            background:#1e293b;

            color:white;

            font-size:16px;

        }

        button.search-btn{

            padding:15px 25px;

            border:none;

            border-radius:10px;

            background:#38bdf8;

            color:white;

            cursor:pointer;

            font-size:16px;

            margin-left:10px;

        }

        .products{

            display:flex;

            flex-wrap:wrap;

            justify-content:center;

            gap:25px;

            margin-top:50px;

        }

        .card{

            background:#111827;

            width:260px;

            padding:20px;

            border-radius:16px;

            box-shadow:0px 0px 20px rgba(56,189,248,0.15);

            transition:0.3s;

        }

        .card:hover{

            transform:translateY(-5px);

        }

        .card img{

            width:100%;

            height:180px;

            object-fit:cover;

            border-radius:12px;

        }

        .price{

            color:lime;

            font-size:20px;

            margin-top:10px;

        }

        .buy-btn{

            margin-top:15px;

            padding:12px 18px;

            border:none;

            border-radius:8px;

            background:#38bdf8;

            color:white;

            cursor:pointer;

            transition:0.3s;

        }

        .buy-btn:hover{

            background:#0284c7;

        }

    </style>

</head>

<body>

<div class="container">

    <h1>Search Products</h1>

    <a href="/">

        <button class="back-btn">

            ← Back To Store

        </button>

    </a>

    <form method="POST">

        <input
            type="text"
            name="search"
            placeholder="Search for products..."
            required
        >

        <button type="submit" class="search-btn">

            Search

        </button>

    </form>

    <div class="products">

        {% for product in products %}

        <div class="card">

            <img src="{{ product.image }}">

            <h2>{{ product.name }}</h2>

            <div class="price">

                {{ product.price }}

            </div>

            <button class="buy-btn">

                Buy Now

            </button>

        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>
